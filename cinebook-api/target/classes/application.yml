# Cinebook API Configuration - Port 8082
server:
  port: 8082
  servlet:
    context-path: /cinebook-api

spring:
  application:
    name: cinebook-api

  # Oracle Database Configuration
  # Shares same database as Partner API but uses different schema/user
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:ORCL
    username: cinebook_user
    password: cinebook_password
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging Configuration
logging:
  level:
    com.xyz.booking: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
